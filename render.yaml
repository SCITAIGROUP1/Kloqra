# Optional Render blueprint — alternative to Railway
# https://render.com/docs/blueprint-spec
#
# Import in Render Dashboard → New → Blueprint.
# Add a Redis instance separately (Render Redis or Upstash) and set REDIS_URL.
# Frontends deploy on Vercel (see docs/runbooks/vercel.md).

services:
  - type: web
    name: kloqra-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: kloqra-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PUBLIC_ADMIN_URL
        sync: false

databases:
  - name: kloqra-db
    plan: starter
    databaseName: kloqra
    user: kloqra
