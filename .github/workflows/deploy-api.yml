name: Deploy API migrations

on:
  push:
    branches:
      - main
      - staging
    paths:
      - "apps/api/**"
      - "packages/contracts/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-api-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: false

jobs:
  migrate:
    name: prisma migrate deploy (${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile --filter @chronomint/api...

      - name: prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pnpm --filter @chronomint/api prisma:generate
          pnpm --filter @chronomint/api exec prisma migrate deploy

      - name: Smoke check (optional)
        if: vars.API_URL != ''
        env:
          API_URL: ${{ vars.API_URL }}
        run: bash scripts/deploy/smoke.sh "$API_URL"
