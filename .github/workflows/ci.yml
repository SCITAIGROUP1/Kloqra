name: CI

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-long
  JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-long
  PUBLIC_CLIENT_URL: http://localhost:3000
  PUBLIC_ADMIN_URL: http://localhost:3002
  PUBLIC_PLATFORM_URL: http://localhost:3003
  NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build
      - name: Client dashboard bundle budget
        run: node scripts/check-bundle-budget.mjs
      - name: Bundle analysis (admin, non-blocking)
        continue-on-error: true
        run: pnpm --filter @kloqra/admin analyze

  unit:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm test:coverage
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          retention-days: 7
          path: |
            apps/api/coverage/**
            packages/contracts/coverage/**
            packages/ui/coverage/**
      - name: Upload unit JUnit
        uses: actions/upload-artifact@v4
        with:
          name: unit-junit
          retention-days: 7
          path: |
            apps/api/test-results/unit-junit.xml
            packages/contracts/test-results/unit-junit.xml

  integration:
    needs: [quality]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kloqra
          POSTGRES_PASSWORD: kloqra
          POSTGRES_DB: kloqra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kloqra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kloqra:kloqra@localhost:5432/kloqra_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm --filter @kloqra/api exec prisma migrate deploy
      - run: pnpm build --filter=@kloqra/contracts
      - run: pnpm prisma:seed
      - run: pnpm test:integration
      - name: Upload integration JUnit
        uses: actions/upload-artifact@v4
        with:
          name: integration-junit
          retention-days: 7
          path: apps/api/test-results/integration-junit.xml

  e2e:
    needs: [integration]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [admin, client, platform-admin]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kloqra
          POSTGRES_PASSWORD: kloqra
          POSTGRES_DB: kloqra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kloqra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kloqra:kloqra@localhost:5432/kloqra_test
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001
      NEXT_PUBLIC_AUTH_SCOPE: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            apps/admin/.next/cache
            apps/client/.next/cache
          key: ${{ runner.os }}-nextjs-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm --filter @kloqra/api exec prisma migrate deploy
      - run: pnpm build --filter=@kloqra/contracts --filter=@kloqra/ui --filter=@kloqra/web-shared
      - run: pnpm prisma:seed
      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-
      - name: Install Playwright Chromium
        run: |
          # GitHub-hosted Ubuntu 24.04 images can ship broken Microsoft APT mirrors
          # (NOSPLIT / InRelease not signed), which makes `install --with-deps` fail.
          for f in /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list; do
            [ -f "$f" ] && sudo rm -f "$f"
          done
          pnpm --filter @kloqra/${{ matrix.app }} exec playwright install chromium --with-deps
      - name: Run E2E tests (Playwright)
        run: |
          pnpm --filter @kloqra/${{ matrix.app }} test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.app }}
          retention-days: 7
          path: |
            apps/${{ matrix.app }}/playwright-report/**
            apps/${{ matrix.app }}/test-results/playwright-junit.xml
