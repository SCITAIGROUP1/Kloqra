name: CI

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: chronomint
          POSTGRES_PASSWORD: chronomint
          POSTGRES_DB: chronomint_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chronomint"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://chronomint:chronomint@localhost:5432/chronomint_test
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-min-32-chars-long
      JWT_REFRESH_SECRET: ci-refresh-secret-min-32-chars-long
      FRONTEND_ORIGIN: http://localhost:3000,http://localhost:3002
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Cache Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            apps/admin/.next/cache
            apps/client/.next/cache
          key: ${{ runner.os }}-nextjs-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-
      - run: pnpm install --frozen-lockfile
      - run: pnpm prisma:generate
      - run: pnpm --filter @chronomint/api exec prisma migrate deploy
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @chronomint/contracts build
      - run: pnpm test
      - run: pnpm build
      - name: Bundle analysis (admin, non-blocking)
        continue-on-error: true
        run: pnpm --filter @chronomint/admin analyze

      - name: Seed database for E2E tests
        run: pnpm prisma:seed

      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: pnpm --filter @chronomint/client exec playwright install --with-deps

      - name: Run E2E tests (Playwright)
        run: |
          pnpm --filter @chronomint/api dev &
          pnpm --filter @chronomint/admin dev &
          for i in {1..60}; do
            curl -sf http://localhost:3001/api/docs >/dev/null &&
            curl -sf http://localhost:3002/login >/dev/null &&
            break || sleep 2
          done
          pnpm --filter @chronomint/client test:e2e
