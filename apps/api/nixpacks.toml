# Railway Nixpacks fallback (when Dockerfile builder is not used).
# Preferred: monorepo root + Dockerfile apps/api/Dockerfile — see ../../railway.toml
#
# If Railway "Root Directory" is apps/api, this ensures contracts is built before the API.

[phases.build]
cmds = [
  "pnpm --filter @kloqra/contracts build",
  "pnpm prisma:generate",
  "pnpm build",
]

[start]
cmd = "node dist/main.js"
